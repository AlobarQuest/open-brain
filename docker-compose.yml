services:
  openbrain-db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: openbrain
      POSTGRES_USER: openbrain
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openbrain"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

  api:
    build: .
    restart: unless-stopped
    depends_on:
      openbrain-db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: openbrain-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: openbrain
      POSTGRES_USER: openbrain
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      MCP_ACCESS_KEY: ${MCP_ACCESS_KEY}
      PORT: 80
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:80/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - default
      - coolify

networks:
  default:
  coolify:
    external: true

volumes:
  postgres_data:
